name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  skill-frontmatter:
    name: skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: ./plugins/spades/scripts/lint/lint-skill-frontmatter.sh

  agents:
    name: agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: ./plugins/spades/scripts/lint/lint-agents.sh

  examples:
    name: examples schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./plugins/spades/scripts/lint/lint-examples.sh

  learnings:
    name: learnings schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: ./plugins/spades/scripts/lint/lint-learnings.sh

  local-frontmatter:
    name: local-mode artefact schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: ./plugins/spades/scripts/lint/lint-local-frontmatter.sh
